<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-Kanade | Singer Recognition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .neon-border { box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); border: 1px solid rgba(56, 189, 248, 0.5); }
        .pulse-red { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    
    <div class="max-w-2xl w-full space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-bold tracking-tighter text-sky-400 mb-2">PROJECT-KANADE</h1>
            <p class="text-slate-400 mono text-sm tracking-widest">REAL-TIME SINGER RECOGNITION V2.0</p>
        </div>

        <div class="bg-slate-800/50 p-10 rounded-3xl neon-border backdrop-blur-sm text-center space-y-6">
            <div id="status-tag" class="inline-block px-3 py-1 rounded-full bg-slate-700 text-xs mono text-slate-400">
                SYSTEM IDLE
            </div>
            
            <div class="h-32 flex flex-col justify-center">
                <h2 id="singer-name" class="text-6xl font-bold tracking-tight">---</h2>
                <p id="confidence-score" class="text-sky-400/70 mono mt-2 text-xl">0.00%</p>
            </div>

            <div class="flex justify-center items-center space-x-1 h-12" id="visualizer">
                <div class="w-1 bg-sky-500 rounded-full h-4"></div>
                <div class="w-1 bg-sky-500 rounded-full h-8"></div>
                <div class="w-1 bg-sky-500 rounded-full h-6"></div>
                <div class="w-1 bg-sky-500 rounded-full h-10"></div>
                <div class="w-1 bg-sky-500 rounded-full h-5"></div>
            </div>
        </div>

        <div class="flex flex-col items-center space-y-4">
            <button id="record-btn" class="group relative px-8 py-4 bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold rounded-2xl transition-all active:scale-95 overflow-hidden">
                <span id="btn-text">START RECOGNITION</span>
            </button>
            <p class="text-slate-500 text-xs mono">VAD OPTIMIZED | RESNET-50 BACKEND</p>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let isRecording = false;
        let recordInterval;

        const recordBtn = document.getElementById('record-btn');
        const singerName = document.getElementById('singer-name');
        const confidenceScore = document.getElementById('confidence-score');
        const statusTag = document.getElementById('status-tag');
        const btnText = document.getElementById('btn-text');

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    startRecognitionCycle(stream);
                    
                    isRecording = true;
                    btnText.innerText = "STOP RECOGNITION";
                    recordBtn.classList.replace('bg-sky-500', 'bg-red-500');
                    statusTag.innerText = "LISTENING...";
                    statusTag.classList.add('pulse-red');
                } catch (err) {
                    alert("Microphone akses ditolak!");
                    console.error(err);
                }
            } else {
                stopRecognitionCycle();
            }
        });

        function startRecognitionCycle(stream) {
            mediaRecorder = new MediaRecorder(stream);

            // Handler tunggal saat data audio tersedia
            mediaRecorder.ondataavailable = async (event) => {
                if (event.data.size > 0) {
                    sendAudioToServer(event.data);
                }
            };

            // Mulai rekaman
            mediaRecorder.start();

            // Interval: Hentikan dan mulai ulang setiap 5 detik agar data terkirim
            recordInterval = setInterval(() => {
                if (mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    mediaRecorder.start();
                }
            }, 5000); 
        }

        function stopRecognitionCycle() {
            clearInterval(recordInterval);
            if (mediaRecorder) mediaRecorder.stop();
            location.reload(); 
        }

        async function sendAudioToServer(audioBlob) {
            const formData = new FormData();
            formData.append('audio', audioBlob, 'rec.webm');

            statusTag.innerText = "PROCESSING...";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.status === "Success") {
                    singerName.innerText = data.singer.toUpperCase();
                    confidenceScore.innerText = (data.confidence * 100).toFixed(2) + "%";
                    statusTag.innerText = "SINGER DETECTED";
                } else {
                    // Menampilkan pesan dari VAD (misal: "Hening/Noise")
                    statusTag.innerText = data.singer || "IDLE";
                }
            } catch (err) {
                console.error("Prediction failed", err);
                statusTag.innerText = "CONNECTION ERROR";
            }
        }
    </script>
</body>
</html>
